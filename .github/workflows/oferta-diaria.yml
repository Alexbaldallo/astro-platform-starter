# Automatización diaria de Chronux: genera la imagen de la oferta del día
# y la publica en Instagram.
#
# (La web NO necesita este workflow para actualizarse: la portada se renderiza
# en el servidor y lee la hoja de Google en cada visita, con caché de 5 min.)
#
# Secrets necesarios (Settings → Secrets and variables → Actions):
#  - IG_USER_ID          ID de la cuenta de Instagram de empresa
#  - IG_ACCESS_TOKEN     Token de la Graph API de Meta
# Sin ellos, el workflow no hace nada.
name: Oferta diaria

on:
  schedule:
    # 06:30 UTC = 08:30 en España en verano (07:30 en invierno). Los minutos en punto van saturados en GitHub.
    - cron: '30 6 * * *'
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

env:
  IG_USER_ID: ${{ secrets.IG_USER_ID }}
  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

jobs:
  oferta-diaria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        if: env.IG_ACCESS_TOKEN != ''
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Generar imagen de la oferta del día
        if: env.IG_ACCESS_TOKEN != ''
        run: node automation/oferta-diaria.mjs generar

      - name: Subir la imagen al repositorio (la servirá chronux.shop)
        if: env.IG_ACCESS_TOKEN != ''
        id: push_imagen
        run: |
          git config user.name "chronux-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A public/ig
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Oferta del día $(date -u +%F) para Instagram"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publicar en Instagram
        if: env.IG_ACCESS_TOKEN != ''
        run: node automation/oferta-diaria.mjs publicar
